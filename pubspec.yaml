name: proyectos
description: 'Flutter To-Do App with Supabase'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.0
  table_calendar: ^3.1.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
